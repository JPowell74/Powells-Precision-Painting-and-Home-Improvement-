<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Powell's Precision Painting</title>
    <style>
        :root { --blue: #2c3e50; --accent: #27ae60; }
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center;
        }
        .thank-you-card { 
            background: white; 
            padding: 40px 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 90%;
        }
        .logo-small { height: 60px; margin-bottom: 20px; }
        h1 { color: var(--blue); margin-bottom: 10px; }
        p { color: #555; margin-bottom: 30px; line-height: 1.5; }
        .back-home { 
            background: var(--blue); 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
            display: inline-block;
        }
        .check-mark { color: var(--accent); font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <img src="https://i.postimg.cc/9FxQrch0/1765935877916.png" alt="Logo" class="logo-small">
        
        <div class="check-mark">✔</div>
        <h1>Estimate Request Sent!</h1>
        <p>Thank you for reaching out to <strong>Powell's Precision Painting</strong>. We've received your details and will contact you shortly to schedule your estimate.</p>
        
        <a href="index.html" class="back-home">Return to Website</a>
    </div>

</body>
</html>
